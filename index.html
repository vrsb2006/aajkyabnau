<!DOCTYPE html>

<title>Aaj Kya Banaun? — Veg Meal Suggestions</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root{
    --cream:#FBF3E7;
    --surface:#FFFBF2;
    --ink:#3A2A1E;
    --ink-soft:#6B5A4B;
    --chili:#C84A33;
    --turmeric:#E2A33B;
    --curry:#5C7A52;
    --line:rgba(58,42,30,0.12);
    --shadow:0 8px 24px rgba(58,42,30,0.10);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--cream);
    background-image:
      radial-gradient(circle at 10% 8%, rgba(226,163,59,0.10), transparent 40%),
      radial-gradient(circle at 90% 85%, rgba(92,122,82,0.08), transparent 45%);
    color:var(--ink);
    font-family:'Work Sans', sans-serif;
    min-height:100vh;
    -webkit-font-smoothing:antialiased;
  }
  .wrap{max-width:560px;margin:0 auto;padding:28px 20px 60px;}

  header{text-align:center;margin-bottom:28px;}
  .eyebrow{
    font-family:'Space Mono', monospace;
    font-size:11px;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--curry);margin-bottom:6px;
  }
  h1{
    font-family:'Fraunces', serif;
    font-weight:700;font-size:clamp(28px,7vw,38px);
    margin:0 0 6px;line-height:1.1;
  }
  .sub{color:var(--ink-soft);font-size:14.5px;max-width:380px;margin:0 auto;}

  /* Tabs */
  .tabs{
    display:flex;background:rgba(58,42,30,0.06);
    border-radius:999px;padding:4px;margin:26px 0 22px;
    gap:4px;
  }
  .tab{
    flex:1;text-align:center;padding:10px 6px;border-radius:999px;
    font-size:14px;font-weight:600;cursor:pointer;border:none;background:none;
    color:var(--ink-soft);transition:background .2s,color .2s;
    font-family:'Work Sans',sans-serif;
  }
  .tab.active{background:var(--surface);color:var(--ink);box-shadow:var(--shadow);}

  /* Suggestion Katori (signature element) */
  .katori-stage{display:flex;justify-content:center;margin:6px 0 18px;position:relative;}
  .katori{
    width:100%;max-width:340px;aspect-ratio:1/1;
    border-radius:50%;
    background:var(--surface);
    box-shadow:var(--shadow), inset 0 0 0 1px var(--line);
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;padding:30px;position:relative;
    transition:transform .25s ease, opacity .25s ease;
  }
  .katori.swap{opacity:0;transform:scale(.96);}
  .steam{position:absolute;top:-2px;left:50%;transform:translateX(-50%);width:60px;height:34px;opacity:.55;}
  @media (prefers-reduced-motion:no-preference){
    .steam path{animation:rise 3.2s ease-in-out infinite;}
    .steam path:nth-child(2){animation-delay:.6s;}
    .steam path:nth-child(3){animation-delay:1.2s;}
  }
  @keyframes rise{
    0%{opacity:0;transform:translateY(0);}
    30%{opacity:.7;}
    100%{opacity:0;transform:translateY(-10px);}
  }
  .dish-name{
    font-family:'Fraunces', serif;font-weight:600;
    font-size:clamp(20px,5.6vw,25px);line-height:1.18;margin:4px 0 10px;
  }
  .serve-note{font-size:13px;color:var(--ink-soft);max-width:230px;margin-bottom:14px;}
  .tagrow{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;}
  .chip{
    font-family:'Space Mono', monospace;font-size:10.5px;letter-spacing:.04em;
    text-transform:uppercase;padding:4px 9px;border-radius:999px;
    background:rgba(58,42,30,0.06);color:var(--ink-soft);
  }
  .chip.veg{color:var(--curry);background:rgba(92,122,82,0.12);}

  /* Action buttons */
  .actions{display:flex;gap:10px;margin-bottom:8px;}
  button.primary, button.ghost{
    flex:1;border:none;border-radius:14px;padding:14px 10px;
    font-family:'Work Sans',sans-serif;font-weight:600;font-size:14.5px;
    cursor:pointer;transition:transform .12s ease, opacity .15s ease;
    display:flex;align-items:center;justify-content:center;gap:7px;
  }
  button.primary{background:var(--chili);color:#fff;}
  button.ghost{background:transparent;color:var(--ink);box-shadow:inset 0 0 0 1.5px var(--line);}
  button:active{transform:scale(0.97);}
  button:disabled{opacity:0.55;cursor:default;transform:none;}
  button:focus-visible{outline:2px solid var(--chili);outline-offset:2px;}

  .made-confirm{
    text-align:center;font-size:13px;color:var(--curry);font-weight:600;
    height:18px;margin:10px 0 0;
  }

  /* Manual log */
  .manual-toggle{
    text-align:center;margin:18px 0 4px;font-size:13px;color:var(--ink-soft);
    text-decoration:underline;cursor:pointer;background:none;border:none;font-family:inherit;
  }
  .manual-panel{display:none;margin-top:12px;}
  .manual-panel.open{display:block;}
  select.manual-select{
    width:100%;padding:11px 12px;border-radius:10px;border:1.5px solid var(--line);
    background:var(--surface);font-family:'Work Sans',sans-serif;font-size:14px;color:var(--ink);
    margin-bottom:8px;
  }

  /* History */
  .history-section{margin-top:34px;}
  .history-head{
    display:flex;align-items:baseline;justify-content:space-between;margin-bottom:10px;
  }
  .history-head h2{
    font-family:'Fraunces',serif;font-size:17px;font-weight:600;margin:0;
  }
  .history-head span{font-size:11.5px;color:var(--ink-soft);font-family:'Space Mono',monospace;}
  .history-list{display:flex;flex-direction:column;gap:8px;}
  .hist-item{
    display:flex;align-items:center;gap:12px;background:var(--surface);
    border-radius:12px;padding:10px 12px;box-shadow:0 2px 8px rgba(58,42,30,0.06);
  }
  .hist-dot{
    width:34px;height:34px;border-radius:50%;flex:none;
    display:flex;align-items:center;justify-content:center;
    font-size:15px;background:rgba(226,163,59,0.18);
  }
  .hist-meta{flex:1;min-width:0;}
  .hist-meta .name{font-weight:600;font-size:14px;line-height:1.25;}
  .hist-meta .when{font-size:11.5px;color:var(--ink-soft);font-family:'Space Mono',monospace;}
  .hist-undo{
    border:none;background:none;color:var(--ink-soft);cursor:pointer;font-size:13px;
    padding:4px 6px;
  }
  .hist-empty{
    font-size:13.5px;color:var(--ink-soft);text-align:center;padding:18px 10px;
    background:var(--surface);border-radius:12px;
  }

  footer{
    text-align:center;margin-top:40px;font-size:11.5px;color:var(--ink-soft);
    font-family:'Space Mono',monospace;letter-spacing:.02em;
  }
</style>

const byId = Object.fromEntries(DB.map(d => [d.id, d]));

/* ---------------- STORAGE ---------------- */
const STORAGE_KEY = "akb_history_v1";

function getHistory(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch(e){ return []; }
}
function saveHistory(h){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(h));
}
function todayStr(){
  return new Date().toISOString().slice(0,10);
}
function daysAgo(dateStr){
  const d1 = new Date(dateStr), d2 = new Date(todayStr());
  return Math.round((d2 - d1) / 86400000);
}
function logMeal(meal, item){
  const h = getHistory();
  h.unshift({date: todayStr(), meal, id: item.id, name: item.name, loggedAt: Date.now()});
  saveHistory(h);
  renderHistory();
}
function undoEntry(loggedAt){
  const h = getHistory().filter(e => e.loggedAt !== loggedAt);
  saveHistory(h);
  renderHistory();
}

/* ---------------- SUGGESTION LOGIC ---------------- */
let currentMeal = pickDefaultMeal();
let currentSuggestion = null;
let sessionExcluded = []; // avoid immediate repeats while shuffling this session

function pickDefaultMeal(){
  const h = new Date().getHours();
  if(h < 11) return "breakfast";
  if(h < 16) return "lunch";
  return "dinner";
}

function poolFor(meal){
  return DB.filter(d => d.meals.includes(meal));
}

function recentIdsFor(meal){
  const h = getHistory();
  const window = meal === "breakfast" ? 1 : 6;
  const relevantMeals = meal === "breakfast" ? ["breakfast"] : ["lunch","dinner"];
  return new Set(
    h.filter(e => relevantMeals.includes(e.meal) && daysAgo(e.date) <= window).map(e => e.id)
  );
}

function pickSuggestion(meal){
  const pool = poolFor(meal);
  const recent = recentIdsFor(meal);
  let candidates = pool.filter(d => !recent.has(d.id) && !sessionExcluded.includes(d.id));
  if(candidates.length === 0) candidates = pool.filter(d => !sessionExcluded.includes(d.id));
  if(candidates.length === 0) candidates = pool;
  return candidates[Math.floor(Math.random() * candidates.length)];
}

/* ---------------- RENDER ---------------- */
const katori = document.getElementById("katori");
const dishNameEl = document.getElementById("dishName");
const serveNoteEl = document.getElementById("serveNote");
const tagRowEl = document.getElementById("tagRow");
const madeConfirmEl = document.getElementById("madeConfirm");

function renderSuggestion(item, animate){
  if(animate){
    katori.classList.add("swap");
    setTimeout(() => fill(item), 140);
  } else {
    fill(item);
  }
}
function fill(item){
  dishNameEl.textContent = item.name;
  serveNoteEl.textContent = item.serve;
  tagRowEl.innerHTML = `
    <span class="chip veg">veg</span>
    <span class="chip">${item.cuisine}</span>
    <span class="chip">${item.time}</span>
  `;
  katori.classList.remove("swap");
}

function newSuggestion(){
  currentSuggestion = pickSuggestion(currentMeal);
  renderSuggestion(currentSuggestion, true);
  madeConfirmEl.textContent = "";
}

function setMeal(meal){
  currentMeal = meal;
  sessionExcluded = [];
  document.querySelectorAll(".tab").forEach(t => {
    t.classList.toggle("active", t.dataset.meal === meal);
  });
  populateManualSelect();
  newSuggestion();
}

/* History rendering */
const historyListEl = document.getElementById("historyList");
const historyCountEl = document.getElementById("historyCount");
const mealDot = {breakfast:"🌅", lunch:"☀️", dinner:"🌙"};

function renderHistory(){
  const h = getHistory().slice(0, 10);
  historyCountEl.textContent = h.length ? `last ${h.length}` : "";
  if(h.length === 0){
    historyListEl.innerHTML = `<div class="hist-empty">Nothing logged yet — mark a meal as made and it'll show up here.</div>`;
    return;
  }
  historyListEl.innerHTML = h.map(e => {
    const d = daysAgo(e.date);
    const when = d === 0 ? "Today" : d === 1 ? "Yesterday" : `${d} days ago`;
    return `
      <div class="hist-item">
        <div class="hist-dot">${mealDot[e.meal] || "🍽"}</div>
        <div class="hist-meta">
          <div class="name">${e.name}</div>
          <div class="when">${when} · ${e.meal}</div>
        </div>
        <button class="hist-undo" data-loggedat="${e.loggedAt}" title="Remove this entry">✕</button>
      </div>
    `;
  }).join("");
  historyListEl.querySelectorAll(".hist-undo").forEach(btn => {
    btn.addEventListener("click", () => undoEntry(Number(btn.dataset.loggedat)));
  });
}

/* Manual log */
const manualToggle = document.getElementById("manualToggle");
const manualPanel = document.getElementById("manualPanel");
const manualSelect = document.getElementById("manualSelect");

function populateManualSelect(){
  const pool = poolFor(currentMeal).slice().sort((a,b) => a.name.localeCompare(b.name));
  manualSelect.innerHTML = pool.map(d => `<option value="${d.id}">${d.name}</option>`).join("");
}

manualToggle.addEventListener("click", () => {
  manualPanel.classList.toggle("open");
});
document.getElementById("manualLogBtn").addEventListener("click", () => {
  const item = byId[manualSelect.value];
  if(!item) return;
  logMeal(currentMeal, item);
  madeConfirmEl.textContent = `Logged "${item.name}" for ${currentMeal} ✓`;
  manualPanel.classList.remove("open");
});

/* Main actions */
document.getElementById("shuffleBtn").addEventListener("click", () => {
  if(currentSuggestion) sessionExcluded.push(currentSuggestion.id);
  newSuggestion();
});
document.getElementById("madeBtn").addEventListener("click", (e) => {
  if(!currentSuggestion) return;
  logMeal(currentMeal, currentSuggestion);
  madeConfirmEl.textContent = `Logged "${currentSuggestion.name}" for ${currentMeal} ✓`;
});

document.querySelectorAll(".tab").forEach(tab => {
  tab.addEventListener("click", () => setMeal(tab.dataset.meal));
});

/* ---------------- INIT ---------------- */
setMeal(currentMeal);
renderHistory();
</script>
</body>
</html>
